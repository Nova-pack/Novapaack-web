<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Preview — Nuevo Albarán A4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        padding: 20px;
        background: #444;
        font-family: 'Inter', Arial, sans-serif;
    }
    .controls {
        max-width: 210mm;
        margin: 0 auto 16px;
        display: flex;
        gap: 8px;
        align-items: center;
    }
    .controls button {
        background: #FF6600;
        color: #fff;
        border: 0;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 700;
        font-size: 0.85rem;
    }
    .controls button.alt {
        background: #444;
    }
    .controls label {
        color: #ddd;
        font-size: 0.85rem;
        margin-left: 8px;
    }
    .controls select {
        background: #222; color: #fff; border: 1px solid #555; padding: 6px 10px; border-radius: 4px;
    }

    /* Hoja A4 — 210 x 297 mm */
    .page {
        width: 210mm;
        min-height: 297mm;
        margin: 0 auto 24px;
        background: white;
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        display: flex;
        flex-direction: column;
    }

    .copy {
        flex: 1;
        padding: 8mm 10mm;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
    }
    .copy + .copy {
        border-top: 2px dashed #bbb;
    }

    /* ── Albarán ── */
    .ticket {
        font-family: 'Inter', Arial, sans-serif;
        color: #000;
        background: #fff;
        border: 2px solid #000;
        padding: 4mm 5mm;
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-sizing: border-box;
    }

    /* Marca de agua provincia (intacta) */
    .watermark {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%) rotate(-25deg);
        font-size: 6rem;
        color: #000;
        font-weight: 900;
        white-space: nowrap;
        z-index: 0;
        pointer-events: none;
        width: 100%;
        text-align: center;
        font-family: 'Arial Black', sans-serif;
        opacity: 0.05;
        text-transform: uppercase;
    }

    /* Cabecera 3 columnas */
    .t-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid #000;
        padding-bottom: 5px;
        margin-bottom: 8px;
        position: relative;
        z-index: 2;
    }
    .t-logo {
        flex: 0 0 28%;
        max-width: 28%;
    }
    .t-logo .brand {
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 18pt;
        color: #FF6600;
        line-height: 1;
        letter-spacing: -0.5px;
    }
    .t-logo .brand .arrow { color: #000; font-weight: 900; }
    .t-logo .comp-info {
        margin-top: 5px;
        font-size: 7.5pt;
        line-height: 1.35;
        color: #333;
    }
    .t-logo .comp-info .nif { font-weight: 700; color: #000; }
    .t-logo .pre-stamp {
        display: inline-block;
        margin-top: 5px;
        padding: 2px 8px;
        border: 2px solid #000;
        background: #fff;
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 7pt;
        letter-spacing: 1px;
    }
    .t-logo .pre-stamp .sub {
        display: block;
        font-size: 5.5pt;
        font-weight: 700;
        letter-spacing: 0;
        margin-top: 1px;
    }

    /* Centro: bloque protagonista */
    .t-center {
        flex: 1;
        padding: 0 8px;
        text-align: center;
    }
    .t-center .porte-label {
        font-size: 9pt;
        font-weight: 700;
        color: #000;
        letter-spacing: 1.5px;
        margin-bottom: 3px;
    }
    .t-center .porte-value {
        font-family: 'Outfit', sans-serif;
        font-size: 18pt;
        font-weight: 900;
        line-height: 1;
        color: #000;
        padding: 2px 0;
        border-top: 1.5px solid #000;
        border-bottom: 1.5px solid #000;
        background: #f0f0f0;
        letter-spacing: 1px;
    }
    .t-center .alb-num {
        margin-top: 6px;
        padding: 4px 6px;
        border: 3px solid #000;
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 22pt;
        line-height: 1;
        letter-spacing: -0.5px;
    }
    .t-center .alb-prov {
        margin-top: 5px;
        font-family: 'Outfit', sans-serif;
        font-weight: 900;
        font-size: 11pt;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    .t-center .alb-extra {
        margin-top: 4px;
        font-size: 8pt;
        font-weight: 700;
        color: #000;
    }
    .t-center .alb-extra .reemb {
        display: inline-block;
        padding: 1px 6px;
        border: 1.5px solid #000;
        margin-left: 5px;
        font-weight: 900;
    }

    /* Derecha: QR + fecha */
    .t-right {
        flex: 0 0 110px;
        text-align: right;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
    }
    .t-right .fecha {
        font-size: 8pt;
        font-weight: 700;
        margin-bottom: 4px;
        color: #000;
    }
    .t-right .qr-box {
        width: 105px;
        height: 105px;
        border: 1px solid #ccc;
        padding: 3px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .t-right .qr-box img { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

    /* Remitente / Destinatario */
    .t-parties {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 8px;
        position: relative;
        z-index: 2;
    }
    .t-parties .box {
        border: 1px solid #999;
        padding: 5px 7px;
        font-size: 9pt;
        line-height: 1.35;
    }
    .t-parties .box.destinatario {
        border: 1.5px solid #000;
    }
    .t-parties .box h4 {
        margin: 0 0 3px;
        font-size: 7.5pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #555;
    }
    .t-parties .box.destinatario h4 { color: #000; }
    .t-parties .box .name {
        font-weight: 700;
        font-size: 10pt;
        margin-bottom: 2px;
    }
    .t-parties .box.destinatario .name {
        font-weight: 900;
        font-size: 11pt;
    }
    .t-parties .box .tel { color: #555; font-size: 8.5pt; }

    /* Artículos */
    .t-articles {
        margin-bottom: 8px;
        position: relative;
        z-index: 2;
    }
    .t-articles .head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        border-bottom: 2px solid #000;
        padding-bottom: 3px;
        margin-bottom: 5px;
    }
    .t-articles .head h4 {
        margin: 0;
        font-size: 8pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .t-articles .head .totals {
        font-size: 10pt;
        font-weight: 900;
    }

    .t-articles .lines {
        font-size: 9.5pt;
        line-height: 1.4;
        column-gap: 14px;
    }
    .t-articles .lines.two-col {
        column-count: 2;
        column-rule: 1px dashed #bbb;
    }
    .t-articles .lines .row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 6px;
        padding: 1px 0;
        break-inside: avoid;
    }
    .t-articles .lines .row .qty {
        font-weight: 900;
        font-size: 10pt;
        flex: 0 0 28px;
    }
    .t-articles .lines .row .name {
        font-weight: 700;
        flex: 0 0 auto;
    }
    .t-articles .lines .row .dots {
        flex: 1;
        border-bottom: 1px dotted #999;
        margin: 0 4px;
        position: relative;
        top: -3px;
    }
    .t-articles .lines .row .weight {
        flex: 0 0 auto;
        font-weight: 700;
        text-align: right;
    }

    /* Observaciones */
    .t-notes {
        border: 1px solid #ccc;
        padding: 4px 8px;
        font-size: 8.5pt;
        margin-bottom: 8px;
        position: relative;
        z-index: 2;
        line-height: 1.4;
    }
    .t-notes strong { font-size: 7.5pt; text-transform: uppercase; letter-spacing: 1px; color: #555; }

    /* Firma simplificada */
    .t-sign {
        margin-top: auto;
        display: grid;
        grid-template-columns: 1fr 1.4fr;
        gap: 10px;
        border-top: 1.5px solid #000;
        padding-top: 6px;
        position: relative;
        z-index: 2;
    }
    .t-sign .col h4 {
        margin: 0 0 2px;
        font-size: 7.5pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #000;
    }
    .t-sign .dni-line {
        border-bottom: 1px solid #000;
        height: 18mm;
    }
    .t-sign .firma-box {
        border: 1px solid #000;
        height: 22mm;
    }

    /* Ejemplar label */
    .copy-label {
        margin-top: 4px;
        text-align: right;
        font-size: 7pt;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #666;
    }

    /* PRINT */
    @media print {
        body { background: white; padding: 0; }
        .controls { display: none; }
        .page { box-shadow: none; margin: 0; page-break-after: always; }
    }
</style>
</head>
<body>

<div class="controls">
    <button onclick="window.print()">🖨️ Vista previa imprimir</button>
    <button class="alt" onclick="toggleData()">🔀 Cambiar entre pocos / muchos artículos</button>
    <button class="alt" onclick="togglePrealbaran()">📦 Toggle PRE-ALBARÁN</button>
    <button class="alt" onclick="togglePorte()">🔁 PAGADO / DEBIDO</button>
    <label>Estado:</label> <span id="status" style="color:#FFB300; font-weight:700; font-size:0.85rem;"></span>
</div>

<div class="page" id="page-1">
    <!-- Se rellena por JS -->
</div>

<script>
var state = {
    manyArticles: false,
    prealbaran: false,
    porteDebido: true
};

function renderTicket(label) {
    var data = sampleData();
    var grouped = groupItems(data.packagesList);
    var manyLines = grouped.length > 6;

    var totalBultos = grouped.reduce(function(s,p){ return s + p.qty; }, 0);
    var totalPeso = grouped.reduce(function(s,p){ return s + (p.weight * p.qty); }, 0).toFixed(0);

    var porteLabel = state.porteDebido ? 'DEBIDOS' : 'PAGADOS';
    var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=' + encodeURIComponent(
        'ID:' + data.id +
        '|DEST:' + data.receiver +
        '|ADDR:' + data.address + ', ' + data.cp + ' ' + data.localidad +
        '|PROV:' + data.province +
        '|TEL:' + data.phone +
        '|COD:' + data.cod +
        '|BULTOS:' + totalBultos +
        '|PESO:' + totalPeso +
        '|CLI:' + data.clientIdNum +
        '|NIF:' + data.receiverNif +
        '|PAY:' + (state.porteDebido ? 'DEBIDO' : 'PAGADO') +
        '|PAYBY:' + (state.porteDebido ? 'receiver' : 'sender') +
        '|COMP:' + data.compId
    );

    var preStamp = state.prealbaran ?
        '<div class="pre-stamp">PRE-ALBARÁN<span class="sub">Completar 24h</span></div>' : '';

    var linesHtml = grouped.map(function(p) {
        return '<div class="row">' +
            '<span class="qty">' + p.qty + '×</span>' +
            '<span class="name">' + esc(p.size) + '</span>' +
            '<span class="dots"></span>' +
            '<span class="weight">' + (p.weight * p.qty).toFixed(0) + ' kg</span>' +
        '</div>';
    }).join('');

    var albNum = state.prealbaran ? 'PR-260515-AB12' : data.id;

    return '' +
    '<div class="ticket">' +
        '<div class="watermark">' + esc(data.province) + '</div>' +

        '<div class="t-header">' +
            '<div class="t-logo">' +
                '<div class="brand">NOVAPACK<span class="arrow">►</span></div>' +
                '<div class="comp-info">' +
                    'admin@novapack.info<br>' +
                    '<span class="nif">NIF: ' + data.compNif + '</span><br>' +
                    '<span style="color:#777; font-size:7pt;">' + data.compName + '</span>' +
                '</div>' +
                preStamp +
            '</div>' +

            '<div class="t-center">' +
                '<div class="porte-label">PORTES</div>' +
                '<div class="porte-value">' + porteLabel + '</div>' +
                '<div class="alb-num">' + albNum + '</div>' +
                '<div class="alb-prov">→ ' + esc(data.province) + ' ←</div>' +
                '<div class="alb-extra">' +
                    'TURNO: ' + data.timeSlot +
                    (parseFloat(data.cod) > 0 ? '<span class="reemb">REEMB: ' + data.cod + '€</span>' : '') +
                '</div>' +
            '</div>' +

            '<div class="t-right">' +
                '<div class="fecha">' + data.dateStr + '</div>' +
                '<div class="qr-box"><img src="' + qrUrl + '" alt="QR"></div>' +
            '</div>' +
        '</div>' +

        '<div class="t-parties">' +
            '<div class="box">' +
                '<h4>Remitente</h4>' +
                '<div class="name">' + esc(data.sender) + '</div>' +
                esc(data.senderAddress) + '<br>' +
                '<span class="tel">Tel: ' + esc(data.senderPhone) + '</span>' +
            '</div>' +
            '<div class="box destinatario">' +
                '<h4>Destinatario</h4>' +
                '<div class="name">' + esc(data.receiver) + '</div>' +
                esc(data.address) + ' · ' + esc(data.cp) + ' ' + esc(data.localidad) + '<br>' +
                '<span class="tel">Tel: ' + esc(data.phone) + '</span>' +
            '</div>' +
        '</div>' +

        '<div class="t-articles">' +
            '<div class="head">' +
                '<h4>Artículos recogidos</h4>' +
                '<span class="totals">' + totalBultos + ' uds · ' + totalPeso + ' kg</span>' +
            '</div>' +
            '<div class="lines ' + (manyLines ? 'two-col' : '') + '">' + linesHtml + '</div>' +
        '</div>' +

        '<div class="t-notes">' +
            '<strong>Observaciones: </strong>' + esc(data.notes) +
        '</div>' +

        '<div class="t-sign">' +
            '<div class="col">' +
                '<h4>DNI / Sello</h4>' +
                '<div class="dni-line"></div>' +
            '</div>' +
            '<div class="col">' +
                '<h4>Firma</h4>' +
                '<div class="firma-box"></div>' +
            '</div>' +
        '</div>' +

        '<div class="copy-label">' + esc(label) + '</div>' +
    '</div>';
}

// Agrupa items por size+peso (caso A)
function groupItems(list) {
    var map = {};
    list.forEach(function(p) {
        var qty = parseInt(p.qty) || 1;
        var weight = parseFloat(p.weight) || 0;
        var size = p.size || 'Bulto';
        var key = size + '|' + weight;
        if (!map[key]) map[key] = { qty: 0, weight: weight, size: size };
        map[key].qty += qty;
    });
    return Object.values(map);
}

function esc(s) {
    return String(s == null ? '' : s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function sampleData() {
    return {
        id: 'NP-26-1234',
        dateStr: '15/05/26 14:32',
        province: 'Córdoba',

        // Empresa facturadora (cambia según t.compId)
        compName: 'NOVAPACK Logística Sofía S.L.',
        compNif: 'B12345678',
        compId: 'comp_sofia',

        // Remitente
        sender: 'AUTOCRISTAL SEVILLA',
        senderAddress: 'Polígono Industrial Z, Nave 12, 41008 Sevilla',
        senderPhone: '954 23 45 67',

        // Destinatario
        receiver: 'JUAN PÉREZ MARTÍNEZ',
        receiverNif: '12345678X',
        address: 'Calle Mayor 22',
        localidad: 'Córdoba',
        cp: '14012',
        phone: '666 78 90 12',
        province: 'Córdoba',

        // Datos
        clientIdNum: '1502',
        timeSlot: 'MAÑANA',
        cod: '150',
        notes: 'Llamar al timbre 3, no funciona el portero automático. Entregar mañana antes de las 12h. Cliente avisa cualquier cambio al móvil.',

        packagesList: state.manyArticles ? manyArticlesList() : fewArticlesList()
    };
}

function fewArticlesList() {
    return [
        { qty: 3, size: 'PAQUETE', weight: 5 },
        { qty: 1, size: 'BULTO',   weight: 12 },
        { qty: 2, size: 'PAQUETE', weight: 5 },   // se agrupa con el primero → 5×PAQ
    ];
}

function manyArticlesList() {
    return [
        { qty: 3, size: 'PAQUETE',  weight: 5 },
        { qty: 2, size: 'PAQUETE',  weight: 5 },   // agrupa → 5
        { qty: 3, size: 'BULTO',    weight: 8 },
        { qty: 2, size: 'PALET',    weight: 50 },
        { qty: 4, size: 'BI-200L',  weight: 10 },
        { qty: 1, size: 'LUNA',     weight: 8 },
        { qty: 2, size: 'SOBRE',    weight: 1 },
        { qty: 3, size: 'BAT',      weight: 12 },
        { qty: 1, size: 'GV',       weight: 25 },
        { qty: 2, size: 'PLT-3',    weight: 35 },
    ];
}

function render() {
    var page = document.getElementById('page-1');
    page.innerHTML =
        '<div class="copy">' + renderTicket('Ejemplar para Administración') + '</div>' +
        '<div class="copy">' + renderTicket('Ejemplar para el Cliente') + '</div>';
    updateStatus();
}

function updateStatus() {
    var bits = [];
    bits.push(state.manyArticles ? 'Muchos artículos (10 líneas → 2 cols auto)' : 'Pocos artículos (3 líneas)');
    bits.push(state.prealbaran ? 'Modo PRE-ALBARÁN' : 'Albarán normal');
    bits.push('Porte ' + (state.porteDebido ? 'DEBIDO' : 'PAGADO'));
    document.getElementById('status').textContent = bits.join(' · ');
}

function toggleData() { state.manyArticles = !state.manyArticles; render(); }
function togglePrealbaran() { state.prealbaran = !state.prealbaran; render(); }
function togglePorte() { state.porteDebido = !state.porteDebido; render(); }

render();
</script>

</body>
</html>
